name: Build Bot C++ EXE (Auto ONNX Export)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kurulumu (Model Dönüşümü İçin)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Ultralytics Yükle ve Modeli ONNX'e Çevir
      run: |
        python -m pip install --upgrade pip
        pip install ultralytics
        # best.pt dosyasını otomatik olarak best.onnx formatına ihraç eder
        python -c "from ultralytics import YOLO; model = YOLO('best.pt'); model.export(format='onnx')"

    - name: MSBuild ve vcpkg Kurulumu
      uses: microsoft/setup-msbuild@v1.1

    - name: C++ Bağımlılıklarını Yükle (OpenCV ve wxWidgets)
      run: |
        vcpkg integrate install
        vcpkg install opencv:x64-windows wxwidgets:x64-windows

    - name: CMake ile Derle
      run: |
        mkdir build
        cd build
        # vcpkg toolchain dosyasını bağlayarak kütüphaneleri C++ projesine dahil ediyoruz
        cmake .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        cmake --build . --config Release

    - name: ONNX Modeli ve Görselleri Çıktı Klasörüne Kopyala
      run: |
        # Çalışabilir dosyanın (EXE) yanına gerekli varlıkları kopyalıyoruz
        if (Test-Path "best.onnx") { copy "best.onnx" "build/Release/" }
        if (Test-Path "mantar.png") { copy "mantar.png" "build/Release/" }

    - name: Hazır EXE ve Paket Dosyalarını Paylaş
      uses: actions/upload-artifact@v4
      with:
        name: FishingBot-CPP-Release
        path: build/Release/
        
