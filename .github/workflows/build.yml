name: Nova Suite - NosTale Bot Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel olarak da tetikleyebilmen için

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller opencv-python pyautogui mss keyboard customtkinter pywin32 pydirectinput groq ultralytics

    - name: Projeyi EXE Olarak Derle (PyInstaller)
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "klasik_olta.png;." --add-data "olta_modeli.pt;." main.py

    - name: Derlenen EXE Dosyasını Kaydet (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Nostale-Hybrid-Bot-EXE
        path: dist/main.exe
        retention-days: 5
        
