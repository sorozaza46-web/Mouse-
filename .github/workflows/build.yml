name: Nostale Bot Exe Derleyici

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller keyboard pyautogui opencv-python numpy customtkinter

    - name: PyInstaller ile EXE Oluştur
      run: |
        # --noconsole ekledik çünkü artık arkada siyah konsol ekranına gerek yok, CustomTkinter menümüz var!
        pyinstaller --onefile --noconsole --add-data "olta_sablonu.png;." --name="Nostale_Balik_Botu" main.py

    - name: Oluşan EXE'yi Artefakt Olarak Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Nostale_Balik_Botu_EXE
        path: dist/Nostale_Balik_Botu.exe
        
